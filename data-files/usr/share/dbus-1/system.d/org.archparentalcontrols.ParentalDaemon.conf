<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the bus name -->
  <policy user="root">
    <allow own="org.archparentalcontrols.ParentalDaemon"/>
  </policy>

  <!-- Only users in the 'wheel' group (admins) can call write methods -->
  <policy group="wheel">
    <allow send_destination="org.archparentalcontrols.ParentalDaemon"
           send_interface="org.archparentalcontrols.ParentalMonitor1"
           send_member="EnableUser"/>
    <allow send_destination="org.archparentalcontrols.ParentalDaemon"
           send_interface="org.archparentalcontrols.ParentalMonitor1"
           send_member="DisableUser"/>
  </policy>

  <!-- Any user can call read-only methods (needed for tray indicator) -->
  <policy context="default">
    <allow send_destination="org.archparentalcontrols.ParentalDaemon"
           send_interface="org.archparentalcontrols.AgeSignal1"
           send_member="GetAgeRange"/>
    <allow send_destination="org.archparentalcontrols.ParentalDaemon"
           send_interface="org.archparentalcontrols.AgeSignal1"
           send_member="IsMinor"/>
    <allow send_destination="org.archparentalcontrols.ParentalDaemon"
           send_interface="org.archparentalcontrols.AgeSignal1"
           send_member="GetAgeGroup"/>
    <allow send_destination="org.archparentalcontrols.ParentalDaemon"
           send_interface="org.archparentalcontrols.ParentalMonitor1"
           send_member="GetMonitoredUsers"/>
    <allow send_destination="org.archparentalcontrols.ParentalDaemon"
           send_interface="org.archparentalcontrols.ParentalMonitor1"
           send_member="GetAppUsage"/>
    <allow send_destination="org.archparentalcontrols.ParentalDaemon"
           send_interface="org.archparentalcontrols.ParentalMonitor1"
           send_member="GetDailyTotals"/>
    <allow send_destination="org.archparentalcontrols.ParentalDaemon"
           send_interface="org.archparentalcontrols.ParentalMonitor1"
           send_member="GetHourlyDistribution"/>
    <allow send_destination="org.archparentalcontrols.ParentalDaemon"
           send_interface="org.archparentalcontrols.ParentalMonitor1"
           send_member="GetRecentSessions"/>
    <allow send_destination="org.archparentalcontrols.ParentalDaemon"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="org.archparentalcontrols.ParentalDaemon"
           send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>
</busconfig>
